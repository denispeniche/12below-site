<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>12Below Admin</title><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--blue:#1a3c6e;--blue-light:#3b82f6;--blue-pale:#eff6ff;--dark:#0f172a;--gray:#64748b;--light:#f8fafc;--border:#e2e8f0;--green:#10b981;--red:#ef4444;--amber:#f59e0b}body{font-family:'Montserrat',sans-serif;background:var(--light);color:var(--dark);-webkit-font-smoothing:antialiased;min-height:100vh}.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a3c6e,#2356a0)}.login-card{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:380px;box-shadow:0 24px 64px rgba(0,0,0,0.2)}.login-logo{font-size:24px;font-weight:900;color:var(--blue);text-align:center;margin-bottom:8px}.login-logo span{color:var(--blue-light)}.login-sub{font-size:13px;color:var(--gray);text-align:center;margin-bottom:28px}.lfield{margin-bottom:14px}.lfield label{display:block;font-size:10px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:var(--blue);margin-bottom:6px}.lfield input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'Montserrat',sans-serif;font-size:14px;outline:none}.btn-login{width:100%;padding:14px;background:var(--blue);color:#fff;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:800;border:none;border-radius:10px;cursor:pointer;text-transform:uppercase;margin-top:8px}.login-err{color:var(--red);font-size:12px;font-weight:700;text-align:center;margin-top:8px;display:none}.dash{display:none}.dash-nav{background:var(--blue);padding:0 6%;height:64px;display:flex;align-items:center;justify-content:space-between}.dash-logo{font-size:20px;font-weight:900;color:#fff}.dash-logo span{color:#93c5fd}.dash-nav-right{display:flex;align-items:center;gap:16px}.dash-nav a{font-size:13px;font-weight:600;color:rgba(255,255,255,0.7);text-decoration:none;padding:8px 14px;border-radius:8px}.dash-nav a:hover{color:#fff;background:rgba(255,255,255,0.1)}.btn-logout{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:#fff;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;padding:8px 16px;border-radius:8px;cursor:pointer}.dash-body{padding:40px 6%}.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:36px}.stat-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:22px}.stat-card-label{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--gray);margin-bottom:8px}.stat-card-val{font-size:32px;font-weight:900;color:var(--blue);letter-spacing:-1px}.stat-card-sub{font-size:12px;color:var(--gray);margin-top:4px}.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}.section-title{font-size:18px;font-weight:800;color:var(--blue)}.filter-row{display:flex;gap:8px}.filter-btn{padding:7px 14px;border:1px solid var(--border);border-radius:8px;background:#fff;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:600;color:var(--gray);cursor:pointer}.filter-btn.active,.filter-btn:hover{background:var(--blue);color:#fff;border-color:var(--blue)}.listings-table{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden}.table-header{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 160px;background:var(--light);border-bottom:1px solid var(--border);padding:12px 20px}.th{font-size:10px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:var(--gray)}.listing-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 160px;padding:14px 20px;border-bottom:1px solid var(--border);align-items:center}.listing-row:hover{background:var(--light)}.car-name{font-size:14px;font-weight:800;color:var(--blue)}.car-meta{font-size:11px;color:var(--gray);margin-top:2px}.price-tag{font-size:14px;font-weight:800;color:var(--dark)}.below-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;margin-top:3px}.below-badge.good{background:var(--green);color:#fff}.below-badge.ok{background:var(--amber);color:#fff}.status-badge{display:inline-flex;font-size:11px;font-weight:700;padding:4px 10px;border-radius:100px}.status-badge.new{background:#dbeafe;color:#1d4ed8}.status-badge.published{background:#d1fae5;color:#065f46}.status-badge.sold{background:#f3f4f6;color:#6b7280}.action-btn{padding:5px 9px;border:1px solid var(--border);border-radius:7px;background:#fff;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;color:var(--blue);cursor:pointer;margin-right:4px;white-space:nowrap}.action-btn:hover{background:var(--blue);color:#fff;border-color:var(--blue)}.action-btn.pub{background:var(--green);color:#fff;border-color:var(--green)}.action-btn.unpub{background:#d1fae5;color:#065f46;border-color:#6ee7b7}.empty-state{text-align:center;padding:60px 20px}.empty-icon{font-size:48px;margin-bottom:16px}.empty-title{font-size:18px;font-weight:800;color:var(--blue);margin-bottom:8px}.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;padding:20px}.modal-overlay.show{display:flex}.modal{background:#fff;border-radius:20px;padding:32px;max-width:560px;width:100%;max-height:85vh;overflow-y:auto;position:relative}.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray)}.modal-title{font-size:20px;font-weight:900;color:var(--blue);margin-bottom:4px}.modal-sub{font-size:13px;color:var(--gray);margin-bottom:24px}.detail-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}.detail-row:last-child{border-bottom:none}.detail-label{color:var(--gray);font-weight:600}.detail-val{color:var(--dark);font-weight:700;text-align:right;max-width:60%}.modal-actions{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap}.btn-status{padding:10px 18px;border:none;border-radius:9px;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:800;cursor:pointer;text-transform:uppercase}.btn-publish{background:var(--green);color:#fff}.btn-unpublish{background:#d1fae5;color:#065f46;border:1.5px solid #6ee7b7}.btn-sold{background:var(--gray);color:#fff}</style></head><body>
<div class="login-wrap" id="loginWrap"><div class="login-card"><div class="login-logo">12<span>Below</span></div><div class="login-sub">Admin Dashboard</div><div class="lfield"><label>Password</label><input type="password" id="pw" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()"></div><button class="btn-login" onclick="doLogin()">Sign in</button><div class="login-err" id="loginErr">Incorrect password</div></div></div>
<div class="dash" id="dash"><div class="dash-nav"><div class="dash-logo">12<span>Below</span> Admin</div><div class="dash-nav-right"><a href="/">Live site</a><a href="/listings/">🚗 /listings</a><button class="btn-logout" onclick="logout()">Sign out</button></div></div>
<div class="dash-body"><div class="stats-row"><div class="stat-card"><div class="stat-card-label">Total</div><div class="stat-card-val" id="statTotal">-</div></div><div class="stat-card"><div class="stat-card-label">New</div><div class="stat-card-val" id="statNew" style="color:var(--blue-light)">-</div></div><div class="stat-card"><div class="stat-card-label">Published</div><div class="stat-card-val" id="statActive" style="color:var(--green)">-</div><div class="stat-card-sub">Live on /listings</div></div><div class="stat-card"><div class="stat-card-label">Sold</div><div class="stat-card-val" id="statSold" style="color:var(--gray)">-</div></div></div>
<div class="section-header"><div class="section-title">Listings</div><div class="filter-row"><button class="filter-btn active" onclick="filt('all',this)">All</button><button class="filter-btn" onclick="filt('new',this)">New</button><button class="filter-btn" onclick="filt('active',this)">Published</button><button class="filter-btn" onclick="filt('sold',this)">Sold</button></div></div>
<div class="listings-table"><div class="table-header"><div class="th">Vehicle</div><div class="th">Price</div><div class="th">Market</div><div class="th">Status</div><div class="th">Actions</div></div><div id="lb"><div class="empty-state"><div class="empty-icon">🔄</div><div class="empty-title">Loading...</div></div></div></div></div></div>
<div class="modal-overlay" id="mo" onclick="if(event.target.id==='mo')cm()"><div class="modal"><button class="modal-close" onclick="cm()">✕</button><div class="modal-title" id="mt">-</div><div class="modal-sub" id="ms">-</div><div id="md"></div><div class="modal-actions" id="ma"></div></div></div>
<script>
var P='12below2026',listings=[],cf='all';
function doLogin(){if(document.getElementById('pw').value===P){document.getElementById('loginWrap').style.display='none';document.getElementById('dash').style.display='block';load();}else document.getElementById('loginErr').style.display='block';}
function logout(){document.getElementById('loginWrap').style.display='flex';document.getElementById('dash').style.display='none';document.getElementById('pw').value='';}
async function load(){try{var r=await fetch('/.netlify/functions/listings');var d=await r.json();if(Array.isArray(d)){listings=d;rd();}else err('API: '+JSON.stringify(d).substring(0,80));}catch(e){err(e.message);}}
function err(m){document.getElementById('lb').innerHTML='<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">'+m+'</div></div>';}
function rd(){var s=document.getElementById;s('statTotal').textContent=listings.length;s('statNew').textContent=listings.filter(function(l){return l.status==='new';}).length;s('statActive').textContent=listings.filter(function(l){return l.status==='active';}).length;s('statSold').textContent=listings.filter(function(l){return l.status==='sold';}).length;rl();}
function filt(f,btn){cf=f;document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');rl();}
function rl(){var fl=cf==='all'?listings:listings.filter(function(l){return l.status===cf;});var body=document.getElementById('lb');if(!fl.length){body.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">No listings</div></div>';return;}body.innerHTML=fl.map(function(l){var pct=l.marketValue?((1-(l.askingPrice/l.marketValue))*100).toFixed(1):null;var sc={new:'new',active:'published',sold:'sold'}[l.status]||'new';var sm={new:'New',active:'Published ✓',sold:'Sold'}[l.status]||l.status;return'<div class="listing-row"><div><div class="car-name">'+l.year+' '+l.make+' '+l.model+'</div><div class="car-meta">'+(l.mileage||'-')+' mi · '+l.condition+' · '+new Date(l.createdAt).toLocaleDateString()+'</div></div><div><div class="price-tag">$'+(l.askingPrice||0).toLocaleString()+'</div>'+(pct?'<div class="below-badge '+(pct>=12?'good':'ok')+'">'+pct+'% below</div>':'')+'</div><div class="price-tag">$'+(l.marketValue||0).toLocaleString()+'</div><div><span class="status-badge '+sc+'">'+sm+'</span></div><div style="display:flex;gap:4px">'+(l.status!=='active'?'<button class="action-btn pub" onclick="act(''+l.id+'','publish')">Publish</button>':'<button class="action-btn unpub" onclick="act(''+l.id+'','unpublish')">Unpublish</button>')+'<button class="action-btn" onclick="ol(''+l.id+'')">View</button></div></div>'  ;}).join('');}
async function act(id,action){try{await fetch('/.netlify/functions/listings?id='+encodeURIComponent(id)+'&action='+action+'&adminKey=12below2026admin');await load();}catch(e){alert(e.message);}}
function ol(id){var l=listings.find(function(x){return String(x.id)===String(id);});if(!l)return;document.getElementById('mt').textContent=l.year+' '+l.make+' '+l.model;document.getElementById('ms').textContent='Submitted '+new Date(l.createdAt).toLocaleString();var pct=l.marketValue?((1-(l.askingPrice/l.marketValue))*100).toFixed(1):'N/A';document.getElementById('md').innerHTML='<div class="detail-row"><span class="detail-label">Seller</span><span class="detail-val">'+(l.name||'-')+'</span></div><div class="detail-row"><span class="detail-label">Email</span><span class="detail-val">'+(l.email||'-')+'</span></div><div class="detail-row"><span class="detail-label">Phone</span><span class="detail-val">'+(l.phone||'-')+'</span></div><div class="detail-row"><span class="detail-label">Mileage</span><span class="detail-val">'+(l.mileage||'-')+' mi</span></div><div class="detail-row"><span class="detail-label">Condition</span><span class="detail-val">'+l.condition+'</span></div><div class="detail-row"><span class="detail-label">VIN</span><span class="detail-val">'+(l.vin||'Not provided')+'</span></div><div class="detail-row"><span class="detail-label">Price</span><span class="detail-val" style="color:var(--blue);font-size:16px">$'+(l.askingPrice||0).toLocaleString()+'</span></div><div class="detail-row"><span class="detail-label">Market</span><span class="detail-val">$'+(l.marketValue||0).toLocaleString()+'</span></div><div class="detail-row"><span class="detail-label">Below mkt</span><span class="detail-val" style="color:var(--green)">'+pct+'%</span></div><div class="detail-row"><span class="detail-label">Location</span><span class="detail-val">'+(l.location||'-')+'</span></div><div class="detail-row"><span class="detail-label">Notes</span><span class="detail-val">'+(l.notes||'None')+'</span></div>';document.getElementById('ma').innerHTML=(l.status!=='active'?'<button class="btn-status btn-publish" onclick="act(''+l.id+'','publish');cm()">✓ Publish to /listings</button>':'<button class="btn-status btn-unpublish" onclick="act(''+l.id+'','unpublish');cm()">Unpublish</button>')+'<button class="btn-status btn-sold" onclick="act(''+l.id+'','sold');cm()">Mark Sold</button>';document.getElementById('mo').classList.add('show');}
function cm(){document.getElementById('mo').classList.remove('show');}
</script></body></html>
