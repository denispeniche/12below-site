<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>12Below Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Montserrat',sans-serif;background:#f4f5f7;color:#1a1a2e;min-height:100vh;}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a3afa 0%,#1228c8 100%);}
.login-card{background:#fff;border-radius:20px;padding:40px 36px;max-width:380px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.login-logo{font-size:28px;font-weight:800;color:#1a3afa;text-align:center;margin-bottom:4px;}
.login-logo span{color:#1a1a2e;}
.login-sub{text-align:center;color:#888;font-size:13px;margin-bottom:28px;}
.lfield{margin-bottom:16px;}
.lfield label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.lfield input{width:100%;border:1.5px solid #e0e2ec;border-radius:10px;padding:12px 14px;font-size:14px;font-family:inherit;transition:border-color .2s;outline:none;}
.lfield input:focus{border-color:#1a3afa;}
.btn-login{width:100%;background:#1a3afa;color:#fff;border:none;padding:14px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-login:hover{background:#1228c8;}
.login-err{color:#dc2626;font-size:12px;text-align:center;margin-top:10px;display:none;}
.login-err.show{display:block;}
.dash{display:none;}
.dash.show{display:block;}
.dash-nav{background:#fff;padding:14px 28px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.08);position:sticky;top:0;z-index:100;}
.dash-logo{font-size:18px;font-weight:800;color:#1a3afa;}
.dash-logo span{color:#1a1a2e;}
.dash-nav-right{display:flex;align-items:center;gap:16px;}
.dash-nav-right a{font-size:13px;color:#555;text-decoration:none;font-weight:500;}
.dash-nav-right a:hover{color:#1a3afa;}
.btn-logout{background:none;border:1.5px solid #e0e2ec;color:#555;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-logout:hover{border-color:#dc2626;color:#dc2626;}
.dash-body{max-width:1100px;margin:0 auto;padding:28px 24px;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;}
.stat-card{background:#fff;border-radius:14px;padding:20px 22px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.stat-label{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.stat-val{font-size:28px;font-weight:800;color:#1a1a2e;}
.stat-val.blue{color:#1a3afa;}
.stat-val.green{color:#22c55e;}
.stat-val.yellow{color:#d97706;}
.filter-bar{background:#fff;border-radius:12px;padding:14px 18px;display:flex;gap:10px;align-items:center;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.filter-btn{border:1.5px solid #e0e2ec;background:#fff;color:#555;padding:7px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;}
.filter-btn.active{background:#1a3afa;color:#fff;border-color:#1a3afa;}
.section-title{font-size:16px;font-weight:700;color:#1a1a2e;margin-bottom:16px;}
.listing-grid{display:flex;flex-direction:column;gap:12px;}
.lcard{background:#fff;border-radius:14px;padding:18px 20px;box-shadow:0 2px 8px rgba(0,0,0,.06);display:grid;grid-template-columns:80px 1fr auto;gap:16px;align-items:center;transition:opacity .3s;}
.lcard-thumb{width:80px;height:60px;border-radius:8px;overflow:hidden;background:#e8ecff;}
.lcard-thumb img{width:100%;height:100%;object-fit:cover;}
.lcard-info{min-width:0;}
.lcard-title{font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:3px;}
.lcard-meta{font-size:12px;color:#888;margin-bottom:6px;}
.lcard-badges{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-active{background:#dcfce7;color:#16a34a;}
.badge-pending{background:#fef9c3;color:#a16207;}
.badge-inactive{background:#f1f5f9;color:#64748b;}
.badge-price{background:#e8f0ff;color:#1a3afa;}
.badge-saving{background:#dcfce7;color:#16a34a;}
.lcard-actions{display:flex;gap:8px;flex-shrink:0;align-items:center;}
.act-btn{border:none;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;}
.act-publish{background:#dcfce7;color:#16a34a;}
.act-publish:hover{background:#16a34a;color:#fff;}
.act-unpublish{background:#fef9c3;color:#a16207;}
.act-unpublish:hover{background:#d97706;color:#fff;}
.act-delete{background:#fee2e2;color:#dc2626;}
.act-delete:hover{background:#dc2626;color:#fff;}
.act-view{background:#e8f0ff;color:#1a3afa;}
.act-view:hover{background:#1a3afa;color:#fff;}
.lcard-date{font-size:11px;color:#bbb;margin-top:4px;}
.loading-state,.empty-state{text-align:center;padding:60px;color:#888;}
.spin{width:32px;height:32px;border:3px solid #e8e9ed;border-top-color:#1a3afa;border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 12px;}
@keyframes sp{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a2e;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.green{background:#16a34a;}
.toast.red{background:#dc2626;}
.confirm-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;align-items:center;justify-content:center;}
.confirm-ov.open{display:flex;}
.confirm-box{background:#fff;border-radius:16px;padding:28px;max-width:380px;width:90%;text-align:center;}
.confirm-box h3{font-size:18px;font-weight:800;margin-bottom:10px;}
.confirm-box p{font-size:13px;color:#666;margin-bottom:22px;line-height:1.6;}
.confirm-btns{display:flex;gap:10px;justify-content:center;}
.confirm-cancel{background:#f1f5f9;color:#555;border:none;padding:10px 22px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.confirm-ok{background:#dc2626;color:#fff;border:none;padding:10px 22px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
@media(max-width:640px){
.stats-row{grid-template-columns:1fr 1fr;}
.lcard{grid-template-columns:60px 1fr;gap:12px;}
.lcard-actions{grid-column:1/-1;flex-wrap:wrap;}
}
</style>
</head>
<body>
<div class="login-wrap" id="loginWrap">
<div class="login-card">
<div class="login-logo">12<span>Below</span></div>
<div class="login-sub">Admin Dashboard</div>
<div class="lfield"><label>Password</label>
<input type="password" id="pw" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()">
</div>
<button class="btn-login" onclick="doLogin()">Sign in</button>
<div class="login-err" id="loginErr">Incorrect password. Try again.</div>
</div>
</div>
<div class="dash" id="dash">
<div class="dash-nav">
<div class="dash-logo">12<span>Below</span> Admin</div>
<div class="dash-nav-right">
<a href="/listings/" target="_blank">View live site</a>
<button class="btn-logout" onclick="logout()">Sign out</button>
</div>
</div>
<div class="dash-body">
<div class="stats-row">
<div class="stat-card"><div class="stat-label">Total Listings</div><div class="stat-val blue" id="statTotal">-</div></div>
<div class="stat-card"><div class="stat-label">Active</div><div class="stat-val green" id="statActive">-</div></div>
<div class="stat-card"><div class="stat-label">Pending Review</div><div class="stat-val yellow" id="statPending">-</div></div>
<div class="stat-card"><div class="stat-label">Avg Below Market</div><div class="stat-val blue" id="statAvg">-</div></div>
</div>
<div class="filter-bar">
<button class="filter-btn active" id="fbAll" onclick="setFilter('all')">All</button>
<button class="filter-btn" id="fbActive" onclick="setFilter('active')">Active</button>
<button class="filter-btn" id="fbPending" onclick="setFilter('pending')">Pending</button>
<button class="filter-btn" id="fbInactive" onclick="setFilter('inactive')">Inactive</button>
</div>
<div class="section-title" id="listingCount">Loading...</div>
<div class="listing-grid" id="listingGrid">
<div class="loading-state"><div class="spin"></div><p>Loading listings...</p></div>
</div>
</div>
</div>
<div class="confirm-ov" id="confirmOv">
<div class="confirm-box">
<h3>Delete Listing?</h3>
<p>This will permanently remove the listing. This cannot be undone.</p>
<div class="confirm-btns">
<button class="confirm-cancel" onclick="closeConfirm()">Cancel</button>
<button class="confirm-ok" id="confirmOkBtn">Delete</button>
</div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
var ADMIN_KEY="12below2026admin",ALL_LISTINGS=[],CURRENT_FILTER="all",SESSION_KEY="12below_admin_auth";
function doLogin(){
var pw=document.getElementById("pw").value.trim();
if(pw===ADMIN_KEY){
sessionStorage.setItem(SESSION_KEY,"1");
document.getElementById("loginWrap").style.display="none";
document.getElementById("dash").classList.add("show");
loadListings();
}else{
document.getElementById("loginErr").classList.add("show");
document.getElementById("pw").value="";
}
}
function logout(){
sessionStorage.removeItem(SESSION_KEY);
document.getElementById("loginWrap").style.display="";
document.getElementById("dash").classList.remove("show");
document.getElementById("pw").value="";
}
function showToast(msg,type){
var t=document.getElementById("toast");
t.textContent=msg;t.className="toast show "+(type||"");
setTimeout(function(){t.className="toast";},3000);
}
function askDelete(id,name){
document.getElementById("confirmOkBtn").onclick=function(){closeConfirm();doDelete(id,name);};
document.getElementById("confirmOv").classList.add("open");
}
function closeConfirm(){document.getElementById("confirmOv").classList.remove("open");}
function setFilter(f){
CURRENT_FILTER=f;
["all","active","pending","inactive"].forEach(function(x){
var el=document.getElementById("fb"+x.charAt(0).toUpperCase()+x.slice(1));
if(el)el.classList.toggle("active",x===f);
});
renderListings();
}
function loadListings(){
fetch("/.netlify/functions/listings?all=true",{headers:{"x-admin-key":ADMIN_KEY}})
.then(function(r){return r.json();})
.then(function(data){ALL_LISTINGS=Array.isArray(data)?data:[];updateStats();renderListings();})
.catch(function(){document.getElementById("listingGrid").innerHTML="<div class='empty-state'><p>Failed to load listings.</p></div>";});
}
function updateStats(){
var total=ALL_LISTINGS.length;
var active=ALL_LISTINGS.filter(function(l){return l.status==="active";}).length;
var pending=ALL_LISTINGS.filter(function(l){return l.status==="pending"||!l.status;}).length;
var sav=ALL_LISTINGS.filter(function(l){return l.marketValue&&l.askingPrice;}).map(function(l){return Math.round((1-l.askingPrice/l.marketValue)*100);});
var avg=sav.length?Math.round(sav.reduce(function(a,b){return a+b;},0)/sav.length):0;
document.getElementById("statTotal").textContent=total;
document.getElementById("statActive").textContent=active;
document.getElementById("statPending").textContent=pending;
document.getElementById("statAvg").textContent=avg?avg+"%":"-";
}
function proxyThumb(url){
if(!url)return "";
var m=url.match(/bunnycdn\.com\/[^\/]+\/(.+)/);
return m?"/.netlify/functions/img?p="+encodeURIComponent(m[1]):url;
}
function renderListings(){
var list=ALL_LISTINGS.slice();
if(CURRENT_FILTER!=="all")list=list.filter(function(l){
if(CURRENT_FILTER==="active")return l.status==="active";
if(CURRENT_FILTER==="pending")return l.status==="pending"||!l.status;
if(CURRENT_FILTER==="inactive")return l.status==="inactive";
return true;
});
list.sort(function(a,b){return(b.createdAt||0)-(a.createdAt||0);});
var grid=document.getElementById("listingGrid");
var lbl=document.getElementById("listingCount");
lbl.textContent=list.length+" listing"+(list.length!==1?"s":"")+(CURRENT_FILTER!=="all"?" ("+CURRENT_FILTER+")":"");
if(!list.length){grid.innerHTML="<div class='empty-state'><p>No listings here.</p></div>";return;}
grid.innerHTML=list.map(function(l){
var thumb=l.photos&&l.photos.length?proxyThumb(l.photos[0]):"";
var status=l.status||"pending";
var date=l.createdAt?new Date(l.createdAt).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):"";
var saving=l.marketValue&&l.askingPrice?Math.round((1-l.askingPrice/l.marketValue)*100):0;
var sbadge=status==="active"?"<span class='badge badge-active'>Active</span>":status==="inactive"?"<span class='badge badge-inactive'>Inactive</span>":"<span class='badge badge-pending'>Pending Review</span>";
var abtn=status==="active"?"<button class='act-btn act-unpublish' onclick='toggleStatus(""+l.id+"","inactive")'>Unpublish</button>":"<button class='act-btn act-publish' onclick='toggleStatus(""+l.id+"","active")'>Publish</button>";
return "<div class='lcard' id='lcard-"+l.id+"'>"+
"<div class='lcard-thumb'>"+(thumb?"<img src='"+thumb+"' alt='car' onerror='this.style.display="none"'>":"")+"</div>"+
"<div class='lcard-info'>"+
"<div class='lcard-title'>"+l.year+" "+l.make+" "+l.model+(l.trim?" "+l.trim:"")+"</div>"+
"<div class='lcard-meta'>"+Number(l.mileage).toLocaleString()+" mi - "+(l.condition||"-")+(l.location?" - "+l.location:"")+"</div>"+
"<div class='lcard-badges'>"+sbadge+"<span class='badge badge-price'>$"+Number(l.askingPrice).toLocaleString()+"</span>"+(saving?"<span class='badge badge-saving'>"+saving+"% below</span>":"")+(l.vin?"<span class='badge badge-inactive' style='font-family:monospace'>"+l.vin+"</span>":"")+"</div>"+
"<div class='lcard-date'>"+(date?"Listed "+date+" | ":"")+(l.name||"")+" "+(l.email?"| "+l.email:"")+(l.phone?" | "+l.phone:"")+"</div>"+
"</div>"+
"<div class='lcard-actions'>"+
"<a class='act-btn act-view' href='/listings/' target='_blank'>View site</a>"+
abtn+
"<button class='act-btn act-delete' onclick='askDelete(""+l.id+"",""+l.year+" "+l.make+" "+l.model+"")'>Delete</button>"+
"</div></div>";
}).join("");
}
function toggleStatus(id,newStatus){
var l=ALL_LISTINGS.find(function(x){return String(x.id)===String(id);});
if(!l)return;
var card=document.getElementById("lcard-"+id);
if(card)card.style.opacity="0.4";
fetch("/.netlify/functions/listings",{method:"PUT",headers:{"Content-Type":"application/json","x-admin-key":ADMIN_KEY},body:JSON.stringify(Object.assign({},l,{status:newStatus}))})
.then(function(r){return r.json();})
.then(function(){l.status=newStatus;updateStats();renderListings();showToast(newStatus==="active"?"Published!":"Unpublished",newStatus==="active"?"green":"");})
.catch(function(){if(card)card.style.opacity="1";showToast("Error updating","red");});
}
function doDelete(id,name){
fetch("/.netlify/functions/listings",{method:"DELETE",headers:{"Content-Type":"application/json","x-admin-key":ADMIN_KEY},body:JSON.stringify({id:id})})
.then(function(r){return r.json();})
.then(function(){ALL_LISTINGS=ALL_LISTINGS.filter(function(x){return String(x.id)!==String(id);});updateStats();renderListings();showToast("Deleted: "+name,"red");})
.catch(function(){showToast("Error deleting","red");});
}
if(sessionStorage.getItem(SESSION_KEY)==="1"){document.getElementById("loginWrap").style.display="none";document.getElementById("dash").classList.add("show");loadListings();}
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeConfirm();});
</script>
</body>
</html>
