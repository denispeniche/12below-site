<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>12Below - Browse Cars 12% Below Market</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Montserrat',sans-serif;background:#f4f5f7;color:#1a1a2e;}
nav{background:#fff;padding:16px 32px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.08);position:sticky;top:0;z-index:100;}
.logo{font-size:22px;font-weight:800;color:#1a3afa;text-decoration:none;}
.nav-btn{background:#1a3afa;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-weight:600;font-size:14px;cursor:pointer;text-decoration:none;}
.hero{background:linear-gradient(135deg,#1a3afa 0%,#1228c8 100%);color:#fff;padding:48px 32px 40px;}
.hero h1{font-size:clamp(24px,4vw,38px);font-weight:800;margin-bottom:8px;}
.hero p{opacity:.85;font-size:15px;margin-bottom:20px;}
.badges{display:flex;gap:10px;flex-wrap:wrap;}
.badge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 14px;border-radius:20px;font-size:13px;}
.badge.active{background:rgba(255,255,255,.95);color:#1a3afa;}
.filters{background:#fff;border-bottom:1px solid #e8e9ed;padding:16px 32px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.fbtn{border:1.5px solid #d0d2dc;background:#fff;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;color:#3a3a5c;font-family:inherit;}
select.fbtn{appearance:none;padding-right:28px;}
.main{max-width:1200px;margin:0 auto;padding:28px 24px;}
.count{font-size:14px;color:#666;margin-bottom:20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;}
.card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);cursor:pointer;transition:transform .2s,box-shadow .2s;}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.12);}
.card-img{width:100%;height:210px;background:#e8ecff;position:relative;overflow:hidden;}
.card-img img{width:100%;height:100%;object-fit:cover;display:block;}
.stag{position:absolute;top:12px;left:12px;background:#1a3afa;color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;z-index:2;}
.pcnt{position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,.6);color:#fff;font-size:11px;padding:3px 8px;border-radius:5px;}
.card-body{padding:16px 18px 18px;}
.cname{font-size:17px;font-weight:700;margin-bottom:4px;}
.cmeta{font-size:12px;color:#888;margin-bottom:12px;}
.price{font-size:22px;font-weight:800;color:#1a3afa;}
.mkt{font-size:12px;color:#888;margin-top:2px;}
.save{font-size:12px;color:#22c55e;font-weight:600;margin-top:2px;}
.cfoot{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid #f0f1f5;margin-top:12px;}
.loc{font-size:12px;color:#888;}
.vbtn{background:#1a3afa;color:#fff;border:none;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}
.vbtn:hover{background:#1228c8;}
.spin{width:36px;height:36px;border:3px solid #e8e9ed;border-top-color:#1a3afa;border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 16px;}
@keyframes sp{to{transform:rotate(360deg);}}
.loading,.empty{text-align:center;padding:80px 20px;color:#888;}
.footer{background:#1a1a2e;color:#fff;text-align:center;padding:48px 32px;margin-top:60px;}
.footer h3{font-size:20px;font-weight:700;margin-bottom:8px;}
.footer p{opacity:.7;font-size:14px;margin-bottom:20px;}
.fbtn2{background:#1a3afa;color:#fff;border:none;padding:14px 32px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}

/* MODAL */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:2000;overflow-y:auto;}
.ov.open{display:flex;align-items:flex-start;justify-content:center;padding:20px;}
.modal{background:#fff;border-radius:20px;max-width:700px;width:100%;margin:20px auto;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3);}

/* Photo gallery */
.gallery{position:relative;background:#111;height:360px;overflow:hidden;}
.gallery img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .3s;}
.gallery img.active{opacity:1;}
.gnav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.5);color:#fff;border:none;width:44px;height:44px;border-radius:50%;font-size:24px;cursor:pointer;z-index:3;display:flex;align-items:center;justify-content:center;}
.gnav:hover{background:rgba(0,0,0,.8);}
.gprev{left:14px;}
.gnext{right:14px;}
.gdots{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:7px;z-index:3;}
.gdot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.45);cursor:pointer;border:none;transition:background .2s;}
.gdot.active{background:#fff;}
.gcount{position:absolute;top:14px;right:14px;background:rgba(0,0,0,.6);color:#fff;font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;}

/* Modal body */
.mbody{padding:28px 32px 32px;}
.mhdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.mtitle{font-size:24px;font-weight:800;color:#1a1a2e;}
.mclose{background:none;border:none;font-size:26px;cursor:pointer;color:#bbb;line-height:1;padding:0;}
.mclose:hover{color:#333;}
.mbadge{display:inline-block;background:#e8f5e9;color:#22c55e;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:16px;}
.mprice-row{display:flex;align-items:baseline;gap:12px;margin-bottom:6px;}
.mprice{font-size:32px;font-weight:800;color:#1a3afa;}
.mmarket{font-size:15px;color:#888;text-decoration:line-through;}
.msaving{font-size:14px;color:#22c55e;font-weight:700;margin-bottom:24px;}

.specs{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid #ebebf0;border-radius:14px;overflow:hidden;margin-bottom:24px;}
.spec{padding:14px 18px;border-bottom:1px solid #ebebf0;}
.spec:nth-last-child(-n+2){border-bottom:none;}
.spec-label{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.spec-val{font-size:14px;font-weight:700;color:#1a1a2e;}

.contact{background:#f8f9ff;border-radius:14px;padding:20px 22px;}
.contact h4{font-size:13px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;}
.cdetail{display:flex;align-items:center;gap:10px;font-size:14px;margin-bottom:10px;}
.cdetail:last-child{margin-bottom:0;}
.cdetail a{color:#1a3afa;font-weight:600;text-decoration:none;}
.cdetail a:hover{text-decoration:underline;}
.call-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:#1a3afa;color:#fff;text-decoration:none;padding:14px;border-radius:12px;font-weight:700;font-size:15px;margin-top:16px;transition:background .2s;}
.call-btn:hover{background:#1228c8;}

@media(max-width:640px){
  .hero,.filters,.main{padding:20px 16px;}
  .grid{grid-template-columns:1fr;}
  .gallery{height:240px;}
  .mbody{padding:20px;}
  .specs{grid-template-columns:1fr;}
  .spec:nth-last-child(-n+2){border-bottom:1px solid #ebebf0;}
  .spec:last-child{border-bottom:none;}
  .ov{padding:0;}
  .modal{border-radius:0;margin:0;min-height:100vh;}
}

.buy-btn{display:block;background:#22c55e;color:#fff;text-align:center;padding:15px;border-radius:12px;font-weight:800;font-size:16px;text-decoration:none;margin-top:12px;transition:background .2s;}
.buy-btn:hover{background:#16a34a;}
</style>
</head>
<body>
<nav><a href="/" class="logo">12Below</a><a href="/list" class="nav-btn">Sell my car</a></nav>
<div class="hero">
  <h1>Cars listed 12% below market</h1>
  <p>Every listing is priced below market value. No dealer markup. No hidden fees.</p>
  <div class="badges">
    <span class="badge active">All cars verified</span>
    <span class="badge">Guaranteed below market</span>
    <span class="badge">DMV area</span>
  </div>
</div>
<div class="filters">
  <select class="fbtn" id="makeFilter"><option value="">All makes</option></select>
  <select class="fbtn" id="modelFilter"><option value="">All models</option></select>
  <select class="fbtn" id="yearFilter"><option value="">Any year</option></select>
  <select class="fbtn" id="priceFilter">
    <option value="">Any price</option>
    <option value="0-15000">Under $15k</option>
    <option value="15000-25000">$15k - $25k</option>
    <option value="25000-40000">$25k - $40k</option>
    <option value="40000-999999">$40k+</option>
  </select>
  <select class="fbtn" id="condFilter">
    <option value="">Any condition</option>
    <option value="excellent">Excellent</option>
    <option value="good">Good</option>
    <option value="fair">Fair</option>
  </select>
  <button class="fbtn" id="clearBtn" style="color:#888;border-color:#e0e0e0">Clear</button>
  <div style="margin-left:auto">
    <select class="fbtn" id="sortSelect">
      <option value="newest">Newest first</option>
      <option value="price-low">Price: Low to High</option>
      <option value="price-high">Price: High to Low</option>
      <option value="savings">Most savings</option>
    </select>
  </div>
</div>
<div class="main">
  <div class="count" id="countLabel">Loading...</div>
  <div id="grid" class="grid"><div class="loading"><div class="spin"></div><p>Loading listings...</p></div></div>
</div>
<div class="footer">
  <h3>Have a car to sell?</h3>
  <p>List it free and earn 20% more than any dealer trade-in.</p>
  <button class="fbtn2" onclick="location.href='/list'">LIST MY CAR FOR FREE</button>
</div>

<div class="ov" id="ov" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox">
    <div class="gallery" id="gallery"></div>
    <div class="mbody">
      <div class="mhdr">
        <div class="mtitle" id="mtitle"></div>
        <button class="mclose" onclick="closeModal()">&#215;</button>
      </div>
      <div class="mbadge" id="mbadge"></div>
      <div class="mprice-row">
        <div class="mprice" id="mprice"></div>
        <div class="mmarket" id="mmarket"></div>
      </div>
      <div class="msaving" id="msaving"></div>
      <div class="specs" id="specs"></div>
      <div class="contact" id="contact"></div>
    </div>
  </div>
</div>

<script>
var AL=[],PI=0,PH=[];

function pu(u){
  if(!u)return null;
  var m=u.match(/\/12below-cars\/(.+)$/);
  return m?'/.netlify/functions/photo?path='+encodeURIComponent(m[1]):u;
}
function fm(n){return Number(n).toLocaleString();}
function cp(s){return s?s.charAt(0).toUpperCase()+s.slice(1):'';}
function pct(l){return l.marketValue&&l.marketValue>0?Math.round((1-l.askingPrice/l.marketValue)*100):12;}
function sp(lb,vl){return '<div class="spec"><div class="spec-label">'+lb+'</div><div class="spec-val">'+(vl||'-')+'</div></div>';}

window.addEventListener('load',function(){
  fetch('/.netlify/functions/listings?status=active')
    .then(function(r){return r.json();})
    .then(function(d){AL=d;fillF();render();})
    .catch(function(){
      document.getElementById('grid').innerHTML='<div class="empty"><h3>No listings yet</h3><p>Be the first to list your car!</p></div>';
      document.getElementById('countLabel').textContent='0 cars found';
    });
});

function fillF(){
  var makes=[...new Set(AL.map(function(l){return l.make;}).filter(Boolean))].sort();
  document.getElementById('makeFilter').innerHTML='<option value="">All makes</option>'+makes.map(function(m){return'<option>'+m+'</option>';}).join('');
  var years=[...new Set(AL.map(function(l){return l.year;}).filter(Boolean))].sort(function(a,b){return b-a;});
  document.getElementById('yearFilter').innerHTML='<option value="">Any year</option>'+years.map(function(y){return'<option>'+y+'</option>';}).join('');
}

function getF(){
  var list=AL.slice();
  var mk=document.getElementById('makeFilter').value;
  var md=document.getElementById('modelFilter').value;
  var yr=document.getElementById('yearFilter').value;
  var pr=document.getElementById('priceFilter').value;
  var co=document.getElementById('condFilter').value;
  var so=document.getElementById('sortSelect').value;
  if(mk)list=list.filter(function(l){return l.make===mk;});
  if(md)list=list.filter(function(l){return l.model===md;});
  if(yr)list=list.filter(function(l){return String(l.year)===yr;});
  if(co)list=list.filter(function(l){return l.condition===co;});
  if(pr){var p=pr.split('-').map(Number);list=list.filter(function(l){return l.askingPrice>=p[0]&&l.askingPrice<=p[1];});}
  if(so==='price-low')list.sort(function(a,b){return a.askingPrice-b.askingPrice;});
  else if(so==='price-high')list.sort(function(a,b){return b.askingPrice-a.askingPrice;});
  else if(so==='savings')list.sort(function(a,b){return(b.marketValue-b.askingPrice)-(a.marketValue-a.askingPrice);});
  else list.sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt);});
  return list;
}

function render(){
  var list=getF();
  document.getElementById('countLabel').textContent=list.length+' car'+(list.length!==1?'s':'')+' found';
  if(!list.length){document.getElementById('grid').innerHTML='<div class="empty"><h3>No matches</h3><p>Clear filters and try again.</p></div>';return;}
  document.getElementById('grid').innerHTML=list.map(ch).join('');
  document.querySelectorAll('.card').forEach(function(c){
    c.addEventListener('click',function(e){
      var l=AL.find(function(x){return String(x.id)===String(c.dataset.id);});
      if(l)openModal(l);
    });
  });
}

function ch(l){
  var ps=(l.photos||[]).map(pu).filter(Boolean);
  var img=ps.length?'<img src="'+ps[0]+'" alt="'+l.year+' '+l.make+'" onerror="this.style.display=\'none\'">':'';
  var pc=ps.length>1?'<div class="pcnt">'+ps.length+' photos</div>':'';
  var sv=l.marketValue?l.marketValue-l.askingPrice:0;
  return '<div class="card" data-id="'+l.id+'">'+
    '<div class="card-img"><div class="stag">'+pct(l)+'% BELOW MARKET</div>'+img+pc+'</div>'+
    '<div class="card-body">'+
    '<div class="cname">'+l.year+' '+l.make+' '+l.model+'</div>'+
    '<div class="cmeta">'+fm(l.mileage)+' mi &middot; '+cp(l.condition)+' condition</div>'+
    '<div class="price">$'+fm(l.askingPrice)+'</div>'+
    (l.marketValue?'<div class="mkt">Market: <s>$'+fm(l.marketValue)+'</s></div>':'')+
    (sv>0?'<div class="save">You save $'+fm(sv)+'</div>':'')+
    '<div class="cfoot"><span class="loc">'+(l.location||l.zip||'DMV area')+'</span><button class="vbtn">View Details</button></div>'+
    '</div></div>';
}

function openModal(l){
  PH=(l.photos||[]).map(pu).filter(Boolean);
  PI=0;
  
  // Build gallery
  var gal=document.getElementById('gallery');
  if(!PH.length){
    gal.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#555;font-size:18px;font-weight:600;">No photos</div>';
  } else {
    var imgs=PH.map(function(p,i){return'<img src="'+p+'" class="'+(i===0?'active':'')+'" alt="Photo '+(i+1)+'">';}).join('');
    var nav=PH.length>1?
      '<button class="gnav gprev" onclick="gph(PI-1)">&#8249;</button>'+
      '<button class="gnav gnext" onclick="gph(PI+1)">&#8250;</button>'+
      '<div class="gdots">'+PH.map(function(_,i){return'<button class="gdot'+(i===0?' active':'')+'" onclick="gph('+i+')"></button>';}).join('')+'</div>'+
      '<div class="gcount"><span id="gcur">1</span> / '+PH.length+'</div>':'';
    gal.innerHTML=imgs+nav;
  }
  
  // Header
  var sv=l.marketValue?l.marketValue-l.askingPrice:0;
  document.getElementById('mtitle').textContent=l.year+' '+l.make+' '+l.model;
  document.getElementById('mbadge').textContent=pct(l)+'% below market price';
  document.getElementById('mprice').textContent='$'+fm(l.askingPrice);
  document.getElementById('mmarket').textContent=l.marketValue?'$'+fm(l.marketValue):'';
  document.getElementById('msaving').textContent=sv>0?'You save $'+fm(sv)+' compared to market value':'';
  
  // Specs
  document.getElementById('specs').innerHTML=
    sp('Year',String(l.year))+
    sp('Make',l.make)+
    sp('Model',l.model)+
    sp('Mileage',fm(l.mileage)+' miles')+
    sp('Condition',cp(l.condition))+
    sp('Location',l.location||l.zip||'DMV area')+
    (l.vin?sp('VIN',l.vin):'')+
    (l.trim?sp('Trim',l.trim):'');
  
  // Contact
  document.getElementById('contact').innerHTML=
    '<h4>Contact Seller</h4>'+
    '<div class="cdetail"><span>&#128100;</span><span style="font-weight:600">'+(l.name||'Seller')+'</span></div>'+
    (l.phone?'<div class="cdetail"><span>&#128222;</span><a href="tel:'+l.phone+'">'+l.phone+'</a></div>':'')+
    (l.email?'<div class="cdetail"><span>&#9993;</span><a href="mailto:'+l.email+'">'+l.email+'</a></div>':'')+
    (l.notes&&l.notes.trim()&&l.notes!=='None'?'<div class="cdetail" style="flex-direction:column;align-items:flex-start;gap:4px"><span style="color:#888;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px">Notes</span><span>'+l.notes+'</span></div>':'')+
    (l.phone?'<a class="call-btn" href="tel:'+l.phone+'">&#128222; Call Seller</a>':
     l.email?'<a class="call-btn" href="mailto:'+l.email+'">&#9993; Email Seller</a>':'');
  
  document.getElementById('ov').classList.add('open');
  document.body.style.overflow='hidden';
}

window.gph=function(i){
  var imgs=document.querySelectorAll('#gallery img');
  var dots=document.querySelectorAll('.gdot');
  var cur=document.getElementById('gcur');
  if(!imgs.length)return;
  i=(i+PH.length)%PH.length;
  imgs[PI].classList.remove('active');
  if(dots[PI])dots[PI].classList.remove('active');
  PI=i;
  imgs[PI].classList.add('active');
  if(dots[PI])dots[PI].classList.add('active');
  if(cur)cur.textContent=PI+1;
};

window.closeModal=function(){
  document.getElementById('ov').classList.remove('open');
  document.body.style.overflow='';
};

document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});

document.getElementById('clearBtn').addEventListener('click',function(){
  ['makeFilter','modelFilter','yearFilter','priceFilter','condFilter'].forEach(function(id){document.getElementById(id).value='';});
  render();
});
['makeFilter','modelFilter','yearFilter','priceFilter','condFilter','sortSelect'].forEach(function(id){
  document.getElementById(id).addEventListener('change',render);
});
document.getElementById('makeFilter').addEventListener('change',function(){
  var mk=this.value;
  document.getElementById('modelFilter').innerHTML='<option value="">All models</option>'+
    (mk?[...new Set(AL.filter(function(l){return l.make===mk;}).map(function(l){return l.model;}).filter(Boolean))].sort().map(function(m){return'<option>'+m+'</option>';}).join(''):'');
  render();
});
</script>
</body>
</html>
