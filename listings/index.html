<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>12Below - Browse Cars 12% Below Market</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Montserrat',sans-serif;background:#f4f5f7;color:#1a1a2e;}
nav{background:#fff;padding:16px 32px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.08);position:sticky;top:0;z-index:100;}
.logo{font-size:22px;font-weight:800;color:#1a3afa;text-decoration:none;}
.nav-btn{background:#1a3afa;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-weight:600;font-size:14px;cursor:pointer;text-decoration:none;}
.hero{background:linear-gradient(135deg,#1a3afa 0%,#1228c8 100%);color:#fff;padding:48px 32px 40px;}
.hero h1{font-size:clamp(24px,4vw,38px);font-weight:800;margin-bottom:8px;}
.hero p{opacity:.85;font-size:15px;margin-bottom:20px;}
.badges{display:flex;gap:10px;flex-wrap:wrap;}
.badge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;}
.badge.active{background:rgba(255,255,255,.95);color:#1a3afa;}
.filters{background:#fff;border-bottom:1px solid #e8e9ed;padding:16px 32px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.filter-btn{border:1.5px solid #d0d2dc;background:#fff;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;color:#3a3a5c;font-family:inherit;}
select.filter-btn{appearance:none;padding-right:28px;}
.clear-btn{color:#888;border-color:#e0e0e0;font-size:12px;}
.sort-wrap{margin-left:auto;}
.main{max-width:1200px;margin:0 auto;padding:28px 24px;}
.count{font-size:14px;color:#666;font-weight:500;margin-bottom:20px;}
.sort-select{border:1.5px solid #d0d2dc;background:#fff;padding:8px 32px 8px 12px;border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer;appearance:none;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;}
.card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:transform .2s,box-shadow .2s;cursor:pointer;}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.12);}
.card-img{width:100%;height:200px;background:linear-gradient(135deg,#e8ecff,#d0d8ff);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.card-img img{width:100%;height:100%;object-fit:cover;display:block;}
.savings-tag{position:absolute;top:12px;left:12px;background:#1a3afa;color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;z-index:2;}
.photo-count{position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,.55);color:#fff;font-size:11px;font-weight:600;padding:3px 8px;border-radius:5px;}
.card-body{padding:16px 18px 18px;}
.car-name{font-size:17px;font-weight:700;margin-bottom:4px;color:#1a1a2e;}
.car-meta{font-size:12px;color:#888;margin-bottom:12px;}
.asking{font-size:22px;font-weight:800;color:#1a3afa;}
.savings{font-size:12px;color:#22c55e;font-weight:600;margin-top:2px;}
.card-footer{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid #f0f1f5;margin-top:12px;}
.location{font-size:12px;color:#888;}
.view-btn{background:#1a3afa;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;}
.loading{text-align:center;padding:80px 20px;color:#888;}
.spinner{width:36px;height:36px;border:3px solid #e8e9ed;border-top-color:#1a3afa;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:80px 20px;color:#888;}
.footer{background:#1a1a2e;color:#fff;text-align:center;padding:48px 32px;margin-top:60px;}
.footer h3{font-size:20px;font-weight:700;margin-bottom:8px;}
.footer p{opacity:.7;font-size:14px;margin-bottom:20px;}
.footer-btn{background:#1a3afa;color:#fff;border:none;padding:14px 32px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;overflow-y:auto;padding:20px;}
.modal-overlay.open{display:block;}
.modal{background:#fff;border-radius:20px;max-width:680px;width:100%;margin:40px auto;overflow:hidden;}
.modal-imgs{position:relative;background:#1a1a2e;height:320px;overflow:hidden;}
.modal-imgs img{width:100%;height:100%;object-fit:cover;display:none;}
.modal-imgs img.active{display:block;}
.img-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.5);color:#fff;border:none;width:40px;height:40px;border-radius:50%;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:3;}
.img-prev{left:12px;}.img-next{right:12px;}
.img-dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:3;}
.img-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.5);cursor:pointer;border:none;}
.img-dot.active{background:#fff;}
.modal-body{padding:24px 28px 28px;}
.modal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.modal-title{font-size:22px;font-weight:800;}
.modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:#aaa;}
.modal-price{font-size:30px;font-weight:800;color:#1a3afa;}
.modal-sub{font-size:13px;color:#888;margin:4px 0 6px;}
.modal-save{font-size:14px;color:#22c55e;font-weight:700;margin-bottom:20px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;border:1px solid #ebebf0;border-radius:12px;overflow:hidden;margin-bottom:20px;}
.info-cell{padding:12px 16px;border-bottom:1px solid #ebebf0;}
.info-cell:nth-last-child(-n+2){border-bottom:none;}
.info-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px;}
.info-val{font-size:14px;font-weight:600;}
.contact-box{background:#f4f5f7;border-radius:12px;padding:18px 20px;}
.contact-box h4{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}
.contact-row{font-size:14px;margin-bottom:8px;}
.contact-row a{color:#1a3afa;font-weight:600;text-decoration:none;}
.call-btn{display:block;background:#1a3afa;color:#fff;text-align:center;padding:14px;border-radius:10px;font-weight:700;font-size:15px;text-decoration:none;margin-top:16px;}
@media(max-width:600px){.hero{padding:32px 20px;}.filters,.main{padding:16px;}.grid{grid-template-columns:1fr;}.modal-imgs{height:220px;}.info-grid{grid-template-columns:1fr;}.modal-body{padding:20px;}}
</style>
</head>
<body>
<nav><a href="/" class="logo">12Below</a><a href="/list" class="nav-btn">Sell my car</a></nav>
<div class="hero">
  <h1>Cars listed 12% below market</h1>
  <p>Every listing is priced below market value. No dealer markup. No hidden fees.</p>
  <div class="badges"><span class="badge active">All cars verified</span><span class="badge">Guaranteed below market</span><span class="badge">DMV area</span></div>
</div>
<div class="filters">
  <select class="filter-btn" id="makeFilter"><option value="">All makes</option></select>
  <select class="filter-btn" id="modelFilter"><option value="">All models</option></select>
  <select class="filter-btn" id="yearFilter"><option value="">Any year</option></select>
  <select class="filter-btn" id="priceFilter">
    <option value="">Any price</option><option value="0-15000">Under $15k</option>
    <option value="15000-25000">$15k-$25k</option><option value="25000-40000">$25k-$40k</option><option value="40000-999999">$40k+</option>
  </select>
  <select class="filter-btn" id="condFilter">
    <option value="">Any condition</option><option value="excellent">Excellent</option><option value="good">Good</option><option value="fair">Fair</option>
  </select>
  <button class="filter-btn clear-btn" id="clearBtn">Clear</button>
  <div class="sort-wrap"><select class="sort-select" id="sortSelect">
    <option value="newest">Newest first</option><option value="price-low">Price: Low to High</option>
    <option value="price-high">Price: High to Low</option><option value="savings">Most savings</option>
  </select></div>
</div>
<div class="main">
  <div class="count" id="countLabel">Loading...</div>
  <div id="grid" class="grid"><div class="loading"><div class="spinner"></div><p>Loading listings...</p></div></div>
</div>
<div class="footer">
  <h3>Have a car to sell?</h3>
  <p>List it free and earn 20% more than any dealer trade-in.</p>
  <button class="footer-btn" onclick="location.href='/list'">LIST MY CAR FOR FREE</button>
</div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-imgs" id="modalImgs"></div>
    <div class="modal-body">
      <div class="modal-header"><div class="modal-title" id="modalTitle"></div><button class="modal-close" id="modalClose">X</button></div>
      <div class="modal-price" id="modalPrice"></div>
      <div class="modal-sub" id="modalMarket"></div>
      <div class="modal-save" id="modalSave"></div>
      <div class="info-grid" id="modalInfo"></div>
      <div class="contact-box" id="modalContact"></div>
    </div>
  </div>
</div>
<script>
var listings=[],photoIdx=0,photos=[];
function proxyUrl(u){if(!u)return null;var m=u.match(/\/12below-cars\/(.+)$/);return m?'/.netlify/functions/photo?path='+encodeURIComponent(m[1]):u;}
function pct(l){return l.marketValue&&l.marketValue>0?Math.round((1-l.askingPrice/l.marketValue)*100):12;}
function fmt(n){return Number(n).toLocaleString();}
function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):'';}
function ic(lb,vl){return'<div class="info-cell"><div class="info-label">'+lb+'</div><div class="info-val">'+(vl||'-')+'</div></div>';}

window.addEventListener('load',function(){
  fetch('/.netlify/functions/listings?status=active')
    .then(function(r){return r.json();})
    .then(function(data){listings=data;fillFilters();render();})
    .catch(function(){
      document.getElementById('grid').innerHTML='<div class="empty"><h3>No listings yet</h3><p>Be the first to list!</p></div>';
      document.getElementById('countLabel').textContent='0 cars found';
    });
});

function fillFilters(){
  var makes=[...new Set(listings.map(function(l){return l.make;}).filter(Boolean))].sort();
  var me=document.getElementById('makeFilter');
  makes.forEach(function(m){var o=document.createElement('option');o.value=m;o.textContent=m;me.appendChild(o);});
  var years=[...new Set(listings.map(function(l){return l.year;}).filter(Boolean))].sort(function(a,b){return b-a;});
  var ye=document.getElementById('yearFilter');
  years.forEach(function(y){var o=document.createElement('option');o.value=y;o.textContent=y;ye.appendChild(o);});
}

function filtered(){
  var list=listings.slice();
  var mk=document.getElementById('makeFilter').value;
  var md=document.getElementById('modelFilter').value;
  var yr=document.getElementById('yearFilter').value;
  var pr=document.getElementById('priceFilter').value;
  var co=document.getElementById('condFilter').value;
  var so=document.getElementById('sortSelect').value;
  if(mk)list=list.filter(function(l){return l.make===mk;});
  if(md)list=list.filter(function(l){return l.model===md;});
  if(yr)list=list.filter(function(l){return String(l.year)===yr;});
  if(co)list=list.filter(function(l){return l.condition===co;});
  if(pr){var p=pr.split('-').map(Number);list=list.filter(function(l){return l.askingPrice>=p[0]&&l.askingPrice<=p[1];});}
  if(so==='price-low')list.sort(function(a,b){return a.askingPrice-b.askingPrice;});
  else if(so==='price-high')list.sort(function(a,b){return b.askingPrice-a.askingPrice;});
  else if(so==='savings')list.sort(function(a,b){return(b.marketValue-b.askingPrice)-(a.marketValue-a.askingPrice);});
  else list.sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt);});
  return list;
}

function render(){
  var list=filtered();
  document.getElementById('countLabel').textContent=list.length+' car'+(list.length!==1?'s':'')+' found';
  if(!list.length){document.getElementById('grid').innerHTML='<div class="empty"><h3>No matches</h3><p>Clear filters and try again.</p></div>';return;}
  document.getElementById('grid').innerHTML=list.map(cardHtml).join('');
  document.querySelectorAll('.card').forEach(function(c){
    c.addEventListener('click',function(){var l=listings.find(function(x){return x.id===c.dataset.id;});if(l)openModal(l);});
  });
}

function cardHtml(l){
  var ps=(l.photos||[]).map(proxyUrl).filter(Boolean);
  var img=ps.length?('<img src="'+ps[0]+'" alt="car" onerror="this.style.display=\'none\'">'):('');
  var pc=ps.length>1?('<div class="photo-count">'+ps.length+' photos</div>'):'';
  var sv=l.marketValue?l.marketValue-l.askingPrice:0;
  return '<div class="card" data-id="'+l.id+'">'+
    '<div class="card-img"><div class="savings-tag">'+pct(l)+'% BELOW MARKET</div>'+img+pc+'</div>'+
    '<div class="card-body">'+
    '<div class="car-name">'+l.year+' '+l.make+' '+l.model+'</div>'+
    '<div class="car-meta">'+fmt(l.mileage)+' mi &middot; '+cap(l.condition)+' condition</div>'+
    '<div class="asking">$'+fmt(l.askingPrice)+'</div>'+
    (l.marketValue?'<div style="font-size:12px;color:#888;margin-top:2px">Market: <s>$'+fmt(l.marketValue)+'</s></div>':'')+
    (sv>0?'<div class="savings">You save $'+fmt(sv)+'</div>':'')+
    '<div class="card-footer"><span class="location">'+(l.location||l.zip||'DMV area')+'</span><button class="view-btn">View Details</button></div>'+
    '</div></div>';
}

function openModal(l){
  photos=(l.photos||[]).map(proxyUrl).filter(Boolean);photoIdx=0;
  var mi=document.getElementById('modalImgs');
  if(!photos.length){mi.innerHTML='';}
  else{
    mi.innerHTML=photos.map(function(p,i){return'<img src="'+p+'" class="'+(i===0?'active':'')+'" alt="photo">';}).join('');
    if(photos.length>1){
      mi.innerHTML+='<button class="img-nav img-prev" onclick="chPhoto(-1)">&#8249;</button>';
      mi.innerHTML+='<button class="img-nav img-next" onclick="chPhoto(1)">&#8250;</button>';
      mi.innerHTML+='<div class="img-dots">'+photos.map(function(_,i){return'<button class="img-dot'+(i===0?' active':'')+'" onclick="goPhoto('+i+')"></button>';}).join('')+'</div>';
    }
  }
  var sv=l.marketValue?l.marketValue-l.askingPrice:0;
  document.getElementById('modalTitle').textContent=l.year+' '+l.make+' '+l.model;
  document.getElementById('modalPrice').textContent='$'+fmt(l.askingPrice);
  document.getElementById('modalMarket').innerHTML=l.marketValue?'Market: <s>$'+fmt(l.marketValue)+'</s>':'';
  document.getElementById('modalSave').textContent=sv>0?'You save $'+fmt(sv)+' ('+pct(l)+'% below market)':'';
  document.getElementById('modalInfo').innerHTML=
    ic('Year',''+l.year)+ic('Make',l.make)+ic('Model',l.model)+ic('Mileage',fmt(l.mileage)+' mi')+
    ic('Condition',cap(l.condition))+ic('Location',l.location||l.zip||'DMV area')+
    (l.vin?ic('VIN',l.vin):'');
  document.getElementById('modalContact').innerHTML=
    '<h4>Contact Seller</h4>'+
    '<div class="contact-row"><b>'+(l.name||'Seller')+'</b></div>'+
    (l.phone?'<div class="contact-row"><a href="tel:'+l.phone+'">'+l.phone+'</a></div>':'')+
    (l.email?'<div class="contact-row"><a href="mailto:'+l.email+'">'+l.email+'</a></div>':'')+
    (l.phone?'<a class="call-btn" href="tel:'+l.phone+'">Call Seller</a>':l.email?'<a class="call-btn" href="mailto:'+l.email+'">Email Seller</a>':'');
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}
window.chPhoto=function(d){goPhoto((photoIdx+d+photos.length)%photos.length);};
window.goPhoto=function(i){
  var imgs=document.querySelectorAll('#modalImgs img');
  var dots=document.querySelectorAll('.img-dot');
  imgs[photoIdx].classList.remove('active');if(dots[photoIdx])dots[photoIdx].classList.remove('active');
  photoIdx=i;imgs[photoIdx].classList.add('active');if(dots[photoIdx])dots[photoIdx].classList.add('active');
};
document.getElementById('modalClose').addEventListener('click',function(){document.getElementById('modal').classList.remove('open');document.body.style.overflow='';});
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this){this.classList.remove('open');document.body.style.overflow='';}});
document.getElementById('clearBtn').addEventListener('click',function(){['makeFilter','modelFilter','yearFilter','priceFilter','condFilter'].forEach(function(id){document.getElementById(id).value='';});render();});
['makeFilter','modelFilter','yearFilter','priceFilter','condFilter','sortSelect'].forEach(function(id){document.getElementById(id).addEventListener('change',render);});
document.getElementById('makeFilter').addEventListener('change',function(){
  var mk=this.value,me=document.getElementById('modelFilter');
  me.innerHTML='<option value="">All models</option>';
  if(mk){[...new Set(listings.filter(function(l){return l.make===mk;}).map(function(l){return l.model;}).filter(Boolean))].sort().forEach(function(m){var o=document.createElement('option');o.value=m;o.textContent=m;me.appendChild(o);});}
  render();
});
</script>
</body>
</html>
