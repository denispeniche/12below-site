[build]
  command = ""
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "BUNNY_STORAGE_ZONE,BUNNY_STORAGE_PASSWORD,BUNNY_STORAGE_REGION,MARKETCHECK_API_KEY,ADMIN_KEY"

[[redirects]]
  from = "/list"
  to = "/list/index.html"
  status = 200

[[redirects]]
  from = "/list/"
  to = "/list/index.html"
  status = 200

[[redirects]]
  from = "/listings"
  to = "/listings/index.html"
  status = 200

[[redirects]]
  from = "/listings/"
  to = "/listings/index.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/"
  to = "/admin/index.html"
  status = 200
[[redirects]]
  from = "/buy"
  to = "/buy/index.html"
  status = 200

[[redirects]]
  from = "/buy/"
  to = "/buy/index.html"
  status = 200
[[redirects]]
  from = "/confirm"
  to = "/confirm/index.html"
  status = 200

[[redirects]]
  from = "/confirm/"
  to = "/confirm/index.html"
  status = 200

# === Canonical domain redirects (force 12below.net + www.* -> 12belowcars.com) ===
[[redirects]]
  from = "https://12below.net/*"
  to = "https://12belowcars.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.12below.net/*"
  to = "https://12belowcars.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.12belowcars.com/*"
  to = "https://12belowcars.com/:splat"
  status = 301
  force = true
